data:
  trainpath: '/mounts/datasets/datasets/2025-ZooCamChallenge/train'
  testpath: '/mounts/datasets/datasets/2025-ZooCamChallenge/test'
  batch_size: 256
  num_workers: 8
  valid_ratio: 0.1
  seed: 42

  img_size: 128
  to_rgb: true
  pad_fill: 255

  analysis:
    compute_analysis: false
    out_dir: './analysis'
    compute_percentiles: true

optim:
  algo: Adam
  params:
    lr: 0.0001

scheduler:
  algo: CosineAnnealingLR
  params:
    T_max: 20 
    eta_min: 1.0e-6

nepochs: 20
loss: "CrossEntropyLoss"

logging:
  logdir: "./logs"
  wandb:
    project: "ZooCamChallenge"
    entity: null

model:
  class: VanillaCNN
  num_layers: 4
  head_hidden: 256
  dropout: 0.2

train:
  resume: false
  checkpoint: ""
  # resume: true
  # checkpoint: "./logs/VanillaCNN_0/best_model.pt"

test:
  checkpoint: "./logs/VanillaCNN_1/best_model.pt" 

output:
  submission_path: "./submission.csv"
